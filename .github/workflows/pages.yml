# Deploy the demo/ folder to GitHub Pages (the client-side mock chat UI).
# The demo works with no backend: 演示模式 runs the pipeline in the browser.
# To connect a real model, open Settings and paste a proxy URL (see docs/DEPLOY.md).
name: Deploy demo to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: demo            # publish only the demo/ folder as the site root
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
